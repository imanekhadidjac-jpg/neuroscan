<style>
    body {
        background: #f1f5f9;
        font-family: Arial;
    }

    .login-box {
        width: 300px;
        margin: 100px auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
    }

    button {
        padding: 10px;
        width: 100%;
        background: #2563eb;
        color: white;
        border: none;
    }
</style>

<div class="login-box">
    <h2>Admin Login</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username"><br>
        <input type="password" name="password" placeholder="Password"><br>
        <button type="submit">Login</button>
    </form>
</div>
