{% extends "layout.html" %}

{% block content %}

<style>
    .navbar {
        display: none;
    }

    .container {
        width: 100%;
        max-width: 100%;
        margin: 0;
        padding: 0;
    }

    .login-page {
        width: 100%;
        height: 100vh;

        display: flex;
    }

    .login-left {
        width: 50%;

        display: flex;
        justify-content: center;
        align-items: center;

        background: white;
    }

    .login-right {
        width: 50%;
    }

    .doctor-side-image {
        width: 100%;
        height: 100vh;

        object-fit: cover;
    }

    .auth-container {
        width: 100%;
        max-width: 400px;

        padding: 40px;

        background: white;

        border-radius: 20px;

        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .login-btn {
        width: 100%;
        margin-top: 20px;
    }
</style>

<div class="login-page">

    <div class="login-left">

        <div class="auth-container">

            <div class="auth-header">
                <h2>Doctor Login</h2>

                <p class="text-muted">
                    Access the Alzheimer Detection System
                </p>
            </div>

            <form method="POST" action="{{ url_for('login') }}">

                <div class="form-group">
                    <label>Username</label>

                    <input type="text" name="username" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Password</label>

                    <input type="password" name="password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary login-btn">
                    Login
                </button>
                <div class="text-center mt-4">
                    <p class="text-muted">
                        Don't have an account?
                        <a href="{{ url_for('signup') }}" style="color:#0d6efd; font-weight:600; text-decoration:none;">
                            Sign Up
                        </a>
                    </p>
                </div>
            </form>

        </div>

    </div>

    <div class="login-right">

        <img src="{{ url_for('static', filename='images/download (4).png') }}" class="doctor-side-image">

    </div>

</div>

{% endblock %}
