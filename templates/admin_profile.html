<style>
    .profile-card {
        overflow: hidden;

        padding: 0;

        border-radius: 25px;

        background: #0f172a;

        color: white;
    }

    .profile-cover {
        height: 180px;

        background: linear-gradient(135deg,
                #2563eb,
                #06b6d4);
    }

    .profile-content {
        padding: 30px;

        text-align: center;

        margin-top: -70px;
    }

    .profile-big-img {
        width: 140px;
        height: 140px;

        border-radius: 50%;

        object-fit: cover;

        border: 6px solid #0f172a;

        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    .profile-role {
        color: #94a3b8;

        margin-top: 8px;

        margin-bottom: 30px;
    }

    .profile-info {
        display: grid;

        grid-template-columns: repeat(3, 1fr);

        gap: 20px;

        margin-top: 25px;
    }

    .info-box {
        background: #1e293b;

        padding: 20px;

        border-radius: 15px;
    }

    .info-box h4 {
        color: #3b82f6;

        margin-bottom: 10px;
    }

    .online-status {
        color: #10b981;

        font-weight: bold;
    }

    .edit-btn {
        margin-top: 30px;

        background: #3b82f6;

        color: white;

        border: none;

        padding: 12px 25px;

        border-radius: 12px;

        cursor: pointer;

        font-weight: 600;

        transition: 0.3s;
    }

    .edit-btn:hover {
        background: #2563eb;

        transform: translateY(-2px);
    }
</style>



<div class="card profile-card">

    <div class="profile-cover"></div>

    <div class="profile-content">

        <img src="{{ url_for('static', filename='images/images.png') }}" class="profile-big-img">

        <h2>
            Admin
        </h2>

        <p class="profile-role">
            AI System Administrator
        </p>

        <div class="profile-info">

            <div class="info-box">
                <h4>Email</h4>
                <p>admin@neuroai.com</p>
            </div>

            <div class="info-box">
                <h4>Role</h4>
                <p>Super Admin</p>
            </div>

            <div class="info-box">
                <h4>Status</h4>
                <p class="online-status">
                    ● Online
                </p>
            </div>

        </div>

        <button class="edit-btn">
            Edit Profile
        </button>

    </div>

</div>
